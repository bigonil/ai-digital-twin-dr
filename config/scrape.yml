global:
  scrape_interval: 10s
  external_labels:
    cluster: digital-twin-dr
    environment: local

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: vmagent
    static_configs:
      - targets: ["vmagent:8429"]
    metrics_path: /metrics

  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics
